info:
  contact:
    name: Damar Djati Wahyu Kemala
    url: https://github.com/dams-code
  description: 'Dokumentasi REST API Alur Obat Farmasi menggunakan Golang (Framework
    : Gin dan Database : PostgreSQL).'
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Final Project REST API Golang
  version: "1.0"
paths:
  /api/admin-farmasi/kategori-obat:
    get:
      description: Mengambil Semua data kategori obat
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil mengambil data kategori obat
          schema:
            $ref: '#/definitions/structs.GetKategoriObatResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Semua Kategori Obat
      tags:
      - 3. Kategori Obat
    post:
      consumes:
      - application/json
      description: Menambahkan kategori obat baru
      parameters:
      - description: Data Kategori Obat
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.TambahdanUpdateKategoriObatRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Kategori obat berhasil ditambahkan
          schema:
            $ref: '#/definitions/structs.TambahKategoriObatResponse'
        "400":
          description: Gagal tambah kategori obat
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "409":
          description: Kategori obat sudah ada
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Tambah Kategori Obat
      tags:
      - 3. Kategori Obat
  /api/admin-farmasi/kategori-obat/{id}:
    delete:
      description: Menghapus kategori obat
      parameters:
      - description: ID Kategori Obat
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Kategori obat berhasil dihapus
          schema:
            $ref: '#/definitions/structs.DeleteKategoriObatResponse'
        "400":
          description: ID Kategori obat tidak valid
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "404":
          description: Kategori obat tidak ditemukan
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete Kategori Obat
      tags:
      - 3. Kategori Obat
    get:
      description: Mengambil detail kategori obat berdasarkan ID
      parameters:
      - description: ID Kategori Obat
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil mengambil detail kategori obat
          schema:
            $ref: '#/definitions/structs.GetKategoriObatByIDResponse'
        "400":
          description: ID Kategori Obat tidak valid
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "404":
          description: Kategori obat tidak ditemukan
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Kategori Obat By ID
      tags:
      - 3. Kategori Obat
    put:
      consumes:
      - application/json
      description: Mengubah data kategori obat
      parameters:
      - description: ID Kategori Obat
        in: path
        name: id
        required: true
        type: integer
      - description: Data Kategori Obat
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.TambahdanUpdateKategoriObatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Kategori obat berhasil diUpdate
          schema:
            $ref: '#/definitions/structs.UpdateKategoriObatResponse'
        "400":
          description: Gagal Update kategori obat
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "404":
          description: Kategori obat tidak ditemukan
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update Kategori Obat
      tags:
      - 3. Kategori Obat
